<app-dashboard-shell
  [title]="'Create patient record'"
  [subtitle]="'Capture diagnosis, treatment plan and follow-up details.'"
>
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body row g-3">
      <div class="col-md-4">
        <label class="form-label">Follow-up date</label>
        <input type="date" class="form-control" [(ngModel)]="followUpDate" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Diagnosis</label>
        <input class="form-control" [(ngModel)]="diagnosis" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Treatment</label>
        <input class="form-control" [(ngModel)]="treatment" />
      </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end">
      <button class="btn btn-primary" (click)="addRecord()">Add record</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Date</th>
            <th>Diagnosis</th>
            <th>Treatment</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let record of records">
            <td>{{ record.date }}</td>
            <td>{{ record.diagnosis }}</td>
            <td>{{ record.treatment }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-dashboard-shell>
