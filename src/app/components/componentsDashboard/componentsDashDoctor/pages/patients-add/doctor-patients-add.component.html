<app-dashboard-shell
  [title]="'Add patient'"
  [subtitle]="'Create a new patient profile with required medical basics.'"
>
  <form class="card border-0 shadow-sm" (ngSubmit)="save()">
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label class="form-label">First name</label>
        <input class="form-control" [(ngModel)]="patient.firstName" name="firstName" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Last name</label>
        <input class="form-control" [(ngModel)]="patient.lastName" name="lastName" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input class="form-control" [(ngModel)]="patient.phone" name="phone" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Chronic condition</label>
        <input class="form-control" [(ngModel)]="patient.chronic" name="chronic" />
      </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-light" routerLink="/doctor/patients">Cancel</button>
      <button type="submit" class="btn btn-primary">Save patient</button>
    </div>
  </form>
</app-dashboard-shell>
