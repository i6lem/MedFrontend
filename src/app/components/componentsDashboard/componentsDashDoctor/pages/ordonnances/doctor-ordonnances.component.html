<app-dashboard-shell
  [title]="'Prescriptions'"
  [subtitle]="'Manage and renew active prescriptions with safety checks.'"
  [metrics]="kpiMetrics"
>
  <div shell-actions class="ordonnances-actions d-flex flex-wrap align-items-center gap-2">
    <button type="button" class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" (click)="createPrescription()">
      <i class="ri-add-line fs-16"></i>
      Create prescription
    </button>

    <div ngbDropdown class="d-inline-block" display="dynamic" placement="bottom-end">
      <button
        type="button"
        class="btn btn-soft-secondary btn-sm d-inline-flex align-items-center gap-1"
        id="ordonnances-more-actions"
        ngbDropdownToggle
      >
        <i class="ri-apps-2-line fs-16"></i>
        More
      </button>
      <div ngbDropdownMenu aria-labelledby="ordonnances-more-actions" class="dropdown-menu-end shadow-sm border-0 py-1">
        <button type="button" ngbDropdownItem class="d-flex align-items-center gap-2 py-2" (click)="importPrescriptions()">
          <i class="ri-upload-2-line text-primary"></i>
          <span>Import prescriptions</span>
        </button>
        <button type="button" ngbDropdownItem class="d-flex align-items-center gap-2 py-2" (click)="openTemplates()">
          <i class="ri-file-list-3-line text-primary"></i>
          <span>Templates &amp; favorites</span>
        </button>
        <button type="button" ngbDropdownItem class="d-flex align-items-center gap-2 py-2" (click)="exportPdf()">
          <i class="ri-file-pdf-line text-danger"></i>
          <span>Export list (PDF)</span>
        </button>
        <div class="dropdown-divider my-1"></div>
        <button type="button" ngbDropdownItem class="d-flex align-items-center gap-2 py-2" (click)="openHistory()">
          <i class="ri-history-line text-muted"></i>
          <span>Renewal history</span>
        </button>
      </div>
    </div>
  </div>

  <div class="ordonnances-toolbar card border-0 shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row g-2 align-items-center">
        <div class="col-md-5 col-lg-4">
          <div class="position-relative">
            <i class="ri-search-line position-absolute top-50 start-0 translate-middle-y ms-3 text-muted fs-16"></i>
            <input
              type="search"
              class="form-control form-control-sm ps-5"
              placeholder="Search patient, drug, prescription ID..."
              [(ngModel)]="searchTerm"
            />
          </div>
        </div>
        <div class="col-md-4 col-lg-3">
          <select class="form-select form-select-sm" [(ngModel)]="filterStatus">
            <option value="all">All statuses</option>
            <option value="active">Active</option>
            <option value="expiring">Expiring soon</option>
            <option value="alert">Interaction alerts</option>
            <option value="expired">Expired</option>
          </select>
        </div>
        <div class="col-md-3 col-lg-5 text-md-end">
          <span class="text-muted fs-13">{{ filteredPrescriptions.length }} result(s)</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm ordonnances-table-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle mb-0 ordonnances-table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Medication</th>
              <th>Dosage</th>
              <th>Duration</th>
              <th>Status</th>
              <th>Ends</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of filteredPrescriptions" class="ordonnances-row">
              <td>
                <div class="fw-semibold text-dark">{{ row.patient }}</div>
                <div class="fs-12 text-muted">ID {{ row.id }}</div>
              </td>
              <td>{{ row.medication }}</td>
              <td><span class="text-muted">{{ row.dosage }}</span></td>
              <td>{{ row.duration }}</td>
              <td>
                <span class="badge rounded-pill border-0" [ngClass]="statusClass(row.status)">
                  {{ statusLabel(row.status) }}
                </span>
              </td>
              <td class="text-muted fs-13">{{ row.endsOn }}</td>
              <td class="text-end">
                <div class="d-inline-flex flex-wrap align-items-center justify-content-end gap-1">
                  <button
                    type="button"
                    class="btn btn-sm btn-soft-primary d-inline-flex align-items-center gap-1"
                    (click)="renew(row)"
                  >
                    <i class="ri-refresh-line"></i>
                    Renew
                  </button>
                  <button
                    type="button"
                    class="btn btn-sm btn-ghost-secondary btn-icon rounded-circle"
                    ngbTooltip="View"
                    (click)="viewRow(row)"
                  >
                    <i class="ri-eye-line"></i>
                  </button>
                  <button
                    type="button"
                    class="btn btn-sm btn-ghost-secondary btn-icon rounded-circle"
                    ngbTooltip="Edit"
                    (click)="editRow(row)"
                  >
                    <i class="ri-pencil-line"></i>
                  </button>
                  <div ngbDropdown display="dynamic" placement="bottom-end" class="d-inline-block">
                    <button
                      type="button"
                      class="btn btn-sm btn-ghost-secondary btn-icon rounded-circle"
                      ngbDropdownToggle
                      [attr.aria-label]="'More for ' + row.patient"
                    >
                      <i class="ri-more-2-fill"></i>
                    </button>
                    <div ngbDropdownMenu class="dropdown-menu-end shadow-sm border-0 py-1">
                      <button type="button" ngbDropdownItem class="py-2" (click)="duplicateRow(row)">
                        <i class="ri-file-copy-line me-2"></i>Duplicate
                      </button>
                      <button type="button" ngbDropdownItem class="py-2" (click)="printRow(row)">
                        <i class="ri-printer-line me-2"></i>Print
                      </button>
                      <div class="dropdown-divider my-1"></div>
                      <button type="button" ngbDropdownItem class="py-2 text-danger" (click)="stopTreatment(row)">
                        <i class="ri-stop-circle-line me-2"></i>Stop treatment
                      </button>
                    </div>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!filteredPrescriptions.length" class="text-center text-muted py-5">
        <i class="ri-inbox-line fs-1 d-block mb-2 opacity-50"></i>
        No prescription matches your filters.
      </div>
    </div>
  </div>
</app-dashboard-shell>
