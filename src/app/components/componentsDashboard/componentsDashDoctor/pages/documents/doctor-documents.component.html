<app-dashboard-shell
  [title]="'Documents medicaux'"
  [subtitle]="'Stockage securise des examens, imageries et comptes rendus.'"
  [metrics]="metrics"
>
  <div shell-actions class="doc-actions d-flex flex-wrap align-items-center gap-2">
    <label class="btn btn-primary btn-sm mb-0 d-inline-flex align-items-center gap-1 cursor-pointer">
      <i class="ri-upload-cloud-2-line"></i>
      Importer un fichier
      <input type="file" class="d-none" accept=".pdf,image/*" (change)="onUploadPick($event)" />
    </label>
    <div ngbDropdown display="dynamic" placement="bottom-end" class="d-inline-block">
      <button type="button" class="btn btn-soft-secondary btn-sm" ngbDropdownToggle>
        <i class="ri-more-2-fill"></i> Plus
      </button>
      <div ngbDropdownMenu class="dropdown-menu-end shadow border-0 py-1">
        <button ngbDropdownItem type="button" class="py-2" (click)="feedback = 'Export ZIP simule.'">
          <i class="ri-folder-zip-line me-2 text-primary"></i>Exporter selection (ZIP)
        </button>
        <button ngbDropdownItem type="button" class="py-2" (click)="feedback = 'Audit log ouvert (simulation).'">
          <i class="ri-shield-check-line me-2 text-success"></i>Journal d acces
        </button>
      </div>
    </div>
  </div>

  <p *ngIf="feedback" class="alert alert-info py-2 px-3 mb-3 mb-0 border-0 shadow-sm">{{ feedback }}</p>

  <div class="doc-toolbar card border-0 shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row g-2 align-items-center">
        <div class="col-md-6 col-lg-5">
          <div class="position-relative">
            <i class="ri-search-line position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input
              type="search"
              class="form-control form-control-sm ps-5"
              placeholder="Rechercher par nom, type ou ID..."
              [(ngModel)]="searchTerm"
            />
          </div>
        </div>
        <div class="col-md-4 col-lg-3">
          <select class="form-select form-select-sm" [(ngModel)]="filterType">
            <option value="all">Tous les types</option>
            <option *ngFor="let t of documentTypes" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="col-md-2 col-lg-4 text-md-end">
          <span class="text-muted small">{{ filteredDocuments.length }} fichier(s)</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm doc-table-card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle mb-0 doc-table">
          <thead>
            <tr>
              <th>Document</th>
              <th>Type</th>
              <th>Taille</th>
              <th>Mise a jour</th>
              <th>Partage</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of filteredDocuments">
              <td>
                <div class="fw-semibold">{{ d.name }}</div>
                <div class="text-muted small">ID {{ d.id }}</div>
              </td>
              <td><span class="doc-type-pill">{{ d.type }}</span></td>
              <td class="text-muted small">{{ d.sizeKb }} Ko</td>
              <td class="text-muted small">{{ d.updatedAt }}</td>
              <td>
                <span class="badge rounded-pill" [ngClass]="d.shared ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'">
                  {{ d.shared ? 'Partage' : 'Interne' }}
                </span>
              </td>
              <td class="text-end">
                <div class="d-inline-flex flex-wrap gap-1 justify-content-end">
                  <button type="button" class="btn btn-sm btn-soft-primary" (click)="openDoc(d)">Ouvrir</button>
                  <button type="button" class="btn btn-sm btn-light" (click)="downloadDoc(d)" ngbTooltip="Telecharger">
                    <i class="ri-download-2-line"></i>
                  </button>
                  <button type="button" class="btn btn-sm btn-light" (click)="toggleShare(d)" ngbTooltip="Basculer partage patient">
                    <i [class]="d.shared ? 'ri-share-forward-line' : 'ri-lock-line'"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!filteredDocuments.length" class="text-center text-muted py-5">
        <i class="ri-folder-open-line fs-1 d-block mb-2 opacity-50"></i>
        Aucun document ne correspond aux filtres.
      </div>
    </div>
  </div>
</app-dashboard-shell>
