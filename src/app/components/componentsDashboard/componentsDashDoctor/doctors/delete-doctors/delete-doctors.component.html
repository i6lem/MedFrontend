<app-dashboard-shell
  [title]="'Delete doctor'"
  [subtitle]="'Remove or archive doctor profiles safely.'"
>
  <div class="card border-0 shadow-sm">
    <div class="card-body table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Doctor</th>
            <th>Specialty</th>
            <th class="text-end">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let d of pendingDoctors">
            <td>{{ d.id }}</td>
            <td>{{ d.name }}</td>
            <td>{{ d.specialty }}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-soft-danger" (click)="remove(d.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end">
      <button class="btn btn-primary" (click)="done()">Done</button>
    </div>
  </div>
</app-dashboard-shell>
