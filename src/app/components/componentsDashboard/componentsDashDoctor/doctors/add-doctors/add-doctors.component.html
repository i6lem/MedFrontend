<app-dashboard-shell
  [title]="'Add doctor'"
  [subtitle]="'Create a new doctor profile and assign specialty.'"
  [secondaryMetrics]="[
    { label: 'Doctors active', value: '14' },
    { label: 'New this month', value: '2' },
    { label: 'On duty today', value: '9' },
    { label: 'Pending profile', value: '1' }
  ]"
>
  <div shell-actions>
    <button class="btn btn-light" routerLink="/doctor/dashboard">Back to dashboard</button>
  </div>

  <form class="card border-0 shadow-sm" (ngSubmit)="save()">
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label class="form-label">First name</label>
        <input class="form-control" [(ngModel)]="doctor.firstName" name="firstName" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Last name</label>
        <input class="form-control" [(ngModel)]="doctor.lastName" name="lastName" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="doctor.email" name="email" required />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input class="form-control" [(ngModel)]="doctor.phone" name="phone" />
      </div>
      <div class="col-md-12">
        <label class="form-label">Specialty</label>
        <input class="form-control" [(ngModel)]="doctor.specialty" name="specialty" />
      </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-light" routerLink="/doctor/dashboard">Cancel</button>
      <button type="submit" class="btn btn-primary">Save doctor</button>
    </div>
  </form>
</app-dashboard-shell>
