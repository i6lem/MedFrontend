<app-dashboard-shell
  [title]="'Nouvelle reclamation'"
  [subtitle]="'Signalement structure : suivi interne et amelioration continue des soins.'"
  [metrics]="metrics"
>
  <div shell-actions class="d-flex flex-wrap gap-2">
    <button type="button" class="btn btn-soft-secondary btn-sm" (click)="reset()">
      <i class="ri-refresh-line"></i> Reinitialiser
    </button>
  </div>

  <div class="reclamation-form-card card border-0 shadow-sm">
    <div class="card-body p-4">
      <form [formGroup]="complaintForm" (ngSubmit)="submit()" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small text-muted mb-1">Patient concerne *</label>
            <input type="text" class="form-control" formControlName="patient" placeholder="Nom et prenom" />
            <div class="invalid-feedback d-block" *ngIf="complaintForm.get('patient')?.invalid && complaintForm.get('patient')?.touched">
              Nom requis.
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label small text-muted mb-1">Email de contact (optionnel)</label>
            <input type="email" class="form-control" formControlName="contactEmail" placeholder="patient@email.com" />
          </div>
          <div class="col-md-8">
            <label class="form-label small text-muted mb-1">Objet *</label>
            <input type="text" class="form-control" formControlName="subject" placeholder="Resume en une ligne" />
          </div>
          <div class="col-md-2">
            <label class="form-label small text-muted mb-1">Priorite *</label>
            <select class="form-select" formControlName="priority">
              <option value="Basse">Basse</option>
              <option value="Normale">Normale</option>
              <option value="Haute">Haute</option>
              <option value="Urgente">Urgente</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small text-muted mb-1">Categorie *</label>
            <select class="form-select" formControlName="category">
              <option value="Qualite des soins">Qualite des soins</option>
              <option value="Accueil / secretariat">Accueil / secretariat</option>
              <option value="Facturation">Facturation</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label small text-muted mb-1">Description detaillee *</label>
            <textarea class="form-control" rows="5" formControlName="description" placeholder="Contexte, date des faits, attente..."></textarea>
            <div class="invalid-feedback d-block" *ngIf="complaintForm.get('description')?.invalid && complaintForm.get('description')?.touched">
              Minimum 15 caracteres.
            </div>
          </div>
          <div class="col-12">
            <label class="consent-box d-flex align-items-start gap-2">
              <input type="checkbox" formControlName="consent" class="form-check-input mt-1" />
              <span class="small text-muted">
                J autorise le cabinet a enregistrer cette reclamation a des fins de traitement et damelioration qualite, conformement a la confidentialite medicale.
              </span>
            </label>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-2 mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="complaintForm.invalid">Enregistrer la reclamation</button>
          <button type="button" class="btn btn-light border" (click)="reset()">Annuler</button>
        </div>
      </form>

      <p *ngIf="feedback" class="alert alert-info mt-3 mb-0 py-2 border-0">{{ feedback }}</p>
    </div>
  </div>
</app-dashboard-shell>
