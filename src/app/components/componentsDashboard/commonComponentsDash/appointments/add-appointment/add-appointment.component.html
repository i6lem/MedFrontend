<div class="update-card">

  <!-- Header -->
  <div class="modal-header">
    <div class="header-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <h2>Book Appointment</h2>
    </div>
    <button class="btn-close" (click)="onCancel()" title="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="modal-body" [formGroup]="form">

    <!-- Patient Name -->
    <div class="form-section">
      <label class="form-label">Patient Name</label>
      <input
        type="text"
        class="form-input"
        formControlName="patientName"
        placeholder="Enter patient name"
      />
    </div>

    <!-- Specialty Pills -->
    <div class="form-section">
      <label class="form-label">Specialty</label>
      <div class="type-pills">
        <button
          type="button"
          *ngFor="let spec of specialties"
          (click)="selectSpecialty(spec)"
          [class.active]="form.value.specialty === spec"
          class="type-btn"
        >
          {{ spec }}
        </button>
      </div>
    </div>

    <!-- Doctor Dropdown -->
    <!-- ✅ Désactivé tant qu'aucune spécialité n'est sélectionnée -->
    <div class="form-section">
      <label class="form-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Doctor
      </label>
      <select
        class="form-input"
        formControlName="idDoctor"
        [attr.disabled]="!form.value.specialty ? true : null"
      >
        <option value="">
          {{ form.value.specialty ? 'Select a doctor' : 'Select a specialty first' }}
        </option>
        <option
          *ngFor="let doc of filteredDoctors"
          [value]="doc.idDoctor"
        >
          {{ doc.fullName }} — {{ doc.specialty }}
        </option>
      </select>

      <!-- ✅ Message informatif si aucun médecin trouvé pour la spécialité -->
      <small
        *ngIf="form.value.specialty && filteredDoctors.length === 0"
        class="hint-text"
      >
        No doctors available for {{ form.value.specialty }}.
      </small>
    </div>

    <!-- Appointment Type -->
    <div class="form-section">
      <label class="form-label">Appointment Type</label>
      <div class="type-buttons">
        <button
          *ngFor="let type of appointmentTypes"
          type="button"
          class="type-btn"
          [class.active]="appointmentType === type.value"
          (click)="selectType(type.value)"
        >
          {{ type.label }}
        </button>
      </div>
    </div>

    <!-- Date -->
    <div class="form-section">
      <label class="form-label">Date</label>
      <input
        type="date"
        class="form-input"
        formControlName="appointmentDate"
        [min]="minDate"
      />
    </div>

    <!-- Time -->
    <div class="form-section">
      <label class="form-label">Time</label>
      <input
        type="time"
        class="form-input"
        formControlName="appointmentTime"
      />
    </div>

  </div>

  <!-- Footer -->
  <div class="modal-footer">
    <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
    <button
      type="button"
      class="btn-primary"
      (click)="onSubmit()"
      [disabled]="form.invalid"
    >
      Book Appointment
    </button>
  </div>

</div>
