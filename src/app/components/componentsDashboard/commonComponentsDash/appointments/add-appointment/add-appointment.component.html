<div class="page">
  <!-- MAIN CARD -->
  <div class="card" [formGroup]="appointmentForm">
    <!-- TOP GRADIENT ACCENT -->
    <div class="gradient-accent"></div>

    <!-- HEADER -->
    <div class="card-header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="18"/>
          <line x1="10" y1="16" x2="14" y2="16"/>
        </svg>
      </div>
      <div class="header-content">
        <h1 class="header-title">{{ 'NewAppointment' }}</h1>
        <p class="header-subtitle">{{ 'FillDetails' }}</p>
      </div>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <!-- Patient Name -->
      <div class="field">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          {{ 'PatientName' }}
        </label>
        <input 
          type="text" 
          formControlName="patientName" 
          placeholder="{{ 'PatientNamePlaceholder' }}">
      </div>

      <!-- Specialty Pills -->
      <div class="field">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          {{ 'Specialty' }}
        </label>
        <div class="type-pills">
          <button 
            type="button"
            class="pill" 
            *ngFor="let sp of specialties" 
            [class.active]="selectedSpecialty === sp.value" 
            (click)="filterSpecialty(sp.value)">
            {{ sp.label }}
          </button>
        </div>
      </div>

      <!-- Doctor Dropdown -->
      <div class="field">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            <path d="M12 14l-2 4h4l-2 4"/>
          </svg>
          {{ 'Doctor' }}
        </label>
        <select formControlName="idDoctor">
          <option value="">{{ 'SelectDoctor' }}</option>
          <option 
            *ngFor="let doc of filteredDoctors" 
            [value]="doc.idDoctor">
            {{ doc.fullName }} — {{ doc.specialty }}
          </option>
        </select>
      </div>

      <!-- Date & Time Row -->
      <div class="row-grid">
        <div class="field">
          <label>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
            </svg>
            {{ 'Date' }}
          </label>
          <input type="date" formControlName="appointmentDate" [min]="minDate">
        </div>
        <div class="field">
          <label>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12,6 12,12 16,14"/>
            </svg>
            {{ 'Time' }}
          </label>
          <input type="time" formControlName="appointmentTime">
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <div class="button-group">
        <button type="button" class="btn btn-outline" (click)="resetForm()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          {{ 'Reset' }}
        </button>
        <button type="button" class="btn btn-primary" (click)="onSubmit()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
            <polyline points="7,3 7,8 15,8"/>
          </svg>
          {{ 'Save' }}
        </button>
      </div>
    </div>
  </div>
</div>
