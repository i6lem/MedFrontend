<!-- Remix Icon CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css">

<div class="apt-card">
  <!-- Header -->
  <div class="apt-header">
    <div class="apt-header__left">
      <div class="apt-header__avatar">
        <img src="https://i.pravatar.cc/100?img=45" alt="Dr. Roberts">
      </div>
      <div class="apt-header__text">
        <span class="apt-label">Next Visit</span>
        <h3 class="apt-title">Dr. Sarah Roberts</h3>
        <p class="apt-specialty">Internal Medicine</p>
      </div>
    </div>
    <div class="apt-header__countdown">
      <span class="apt-countdown__number">2</span>
      <span class="apt-countdown__label">days left</span>
    </div>
  </div>

  <!-- Timeline -->
  <div class="apt-timeline">
    <div class="apt-timeline__item">
      <div class="apt-timeline__icon">
        <i class="ri-calendar-line"></i>
      </div>
      <div class="apt-timeline__content">
        <span class="apt-timeline__label">Date</span>
        <span class="apt-timeline__value">Thursday, April 6, 2026</span>
      </div>
    </div>
    <div class="apt-timeline__item">
      <div class="apt-timeline__icon">
        <i class="ri-time-line"></i>
      </div>
      <div class="apt-timeline__content">
        <span class="apt-timeline__label">Time</span>
        <span class="apt-timeline__value">2:00 PM - 2:30 PM</span>
      </div>
    </div>
    <div class="apt-timeline__item">
      <div class="apt-timeline__icon">
        <i class="ri-video-line"></i>
      </div>
      <div class="apt-timeline__content">
        <span class="apt-timeline__label">Type</span>
        <span class="apt-timeline__value">Video Consultation</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="apt-actions">
    <button class="apt-btn apt-btn--primary">
      <i class="ri-video-line"></i>
      Join Session
    </button>
    <button class="apt-btn apt-btn--ghost">
      <i class="ri-calendar-add-line"></i>
      View Details
    </button>
  </div>
</div>
