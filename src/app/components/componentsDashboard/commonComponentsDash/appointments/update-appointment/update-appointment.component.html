<div class="page">
  <!-- AMBIENT BACKGROUND -->
  <div class="ambient-bg">
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="card" [formGroup]="form">
    <!-- TOP GRADIENT ACCENT -->
    <div class="gradient-accent"></div>

    <!-- HEADER -->
    <div class="card-header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="header-content">
        <h1 class="header-title">{{ 'UpdateAppointment' }}</h1>
        <p class="header-subtitle">{{ 'FillDetails' }}</p>
      </div>
    </div>

    <!-- BODY -->
    <div class="card-body">
      <!-- DATE & TIME ROW -->
      <div class="row-grid">
        <div class="field">
          <label>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
            </svg>
            {{ 'Date' }}
          </label>
          <input type="date" formControlName="appointmentDate" [min]="minDate">
        </div>
        <div class="field">
          <label>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12,6 12,12 16,14"/>
            </svg>
            {{ 'Time' }}
          </label>
          <input type="time" formControlName="appointmentTime">
        </div>
      </div>

      <!-- TYPE PILLS -->
      <div class="field">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
          </svg>
          {{ 'Type' }}
        </label>
        <div class="type-pills">
          <button 
            type="button"
            class="pill" 
            *ngFor="let sp of appointmentTypes" 
            [class.active]="appointmentType === sp.value" 
            (click)="filterSpecialty(sp.value)">
            {{ sp.label }}
          </button>
        </div>
      </div>

      <!-- INFO CARD -->
      <div class="info-card">
        <div class="info-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22,4 12,14.01 9,11.01"/>
          </svg>
        </div>
        <div class="info-content">
          <p class="info-title">{{ 'ConfirmAppointment' }}</p>
          <p class="info-description">{{ 'NotificationSent' }}</p>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <div class="button-group">
        <button type="button" class="btn btn-outline" (click)="resetForm()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          {{ 'Reset' }}
        </button>
        <button type="button" class="btn btn-primary" (click)="onSubmit()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
            <polyline points="7,3 7,8 15,8"/>
          </svg>
          {{ 'Update' }}
        </button>
      </div>
    </div>

    <!-- DECORATIVE CORNER -->
    <div class="card-decoration"></div>
  </div>
</div>
