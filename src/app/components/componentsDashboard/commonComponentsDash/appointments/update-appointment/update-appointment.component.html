<div class="update-card">

  <!-- Modal Header -->
  <div class="modal-header">
    <div class="header-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <h2>Edit Appointment</h2>
    </div>
    <button class="btn-close" (click)="onCancel()" title="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Modal Body -->
  <div class="modal-body" [formGroup]="form">

    <!-- Appointment Type -->
    <div class="form-section">
      <label class="form-label">Appointment Type</label>
      <div class="type-buttons">
        <button
          *ngFor="let type of appointmentTypes"
          type="button"
          class="type-btn"
          [class.active]="appointmentType === type.value"
          (click)="filterSpecialty(type.value)">
          {{ type.label }}
        </button>
      </div>
    </div>

    <!-- Date -->
    <div class="form-section">
      <label class="form-label" for="appointmentDate">Date</label>
      <input
        id="appointmentDate"
        type="date"
        class="form-input"
        formControlName="appointmentDate"
        [min]="minDate" />
    </div>

    <!-- Time -->
    <div class="form-section">
      <label class="form-label" for="appointmentTime">Time</label>
      <input
        id="appointmentTime"
        type="time"
        class="form-input"
        formControlName="appointmentTime" />
    </div>

  </div>

  <!-- Modal Footer -->
  <div class="modal-footer">
    <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="button" class="btn-primary" (click)="onSubmit()">Save Changes</button>
  </div>

</div>
