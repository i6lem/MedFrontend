<div class="dashboard-header" style="margin-bottom: 24px;">
  <h1 class="dashboard-header__title">
        <span class="dashboard-header__name">{{ userName }}</span>
  </h1>
  <p class="dashboard-header__subtitle">Here's your health overview for today</p>
</div>
 

<!-- Widgets Container -->
<div class="widgets-container" style="display:flex; flex-direction:column; gap:24px;">

  <div class="dashboard-layout__row" style="display:flex; gap:24px;">

    <div class="dashboard-layout__col--wide" style="flex:2;">
      <app-next-appointment></app-next-appointment>
    </div>

    <div class="dashboard-layout__col--narrow" style="flex:1;">
      <app-quick-actions></app-quick-actions>
    </div>
  </div>

    <div class="dashboard-layout__row" style="display:flex; gap:24px;">
       <!-- Health Overview -->
    <div style="flex: 1;">
      <app-health-overview></app-health-overview>
    </div>
       <!-- Medications Card -->
    <div style="flex: 1;">
      <app-medications-card></app-medications-card>
    </div>
        <!-- Lab Results Card -->
    <div style="flex: 1;">
      <app-lab-results-card></app-lab-results-card>
    </div>
  </div>
  <!-- Engagement Panel -->
  <div style="margin-top: 8px;">
    <app-engagement-panel></app-engagement-panel>
  </div>

</div>
