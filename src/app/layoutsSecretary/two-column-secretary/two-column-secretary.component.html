<div id="layout-wrapper" (window:resize)="onResize($event)">
    <!-- Top Bar 
    <app-topbar (mobileMenuButtonClicked)="onToggleMobileMenu()"></app-topbar>-->
    <!-- Side Bar -->
    @if(issemiboxLayoutRequested()){
    <app-sidebar-secretary></app-sidebar-secretary>">
    }
    @if(isTwoColumnLayoutRequested()){
    <app-two-column-sidebar-secretary></app-two-column-sidebar-secretary>
    }
    <app-sidebar-secretary id="side-bar" class="d-none"></app-sidebar-secretary>
    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid">
                <!-- Main Content -->
                <router-outlet></router-outlet>
            </div>
        </div>
        <!-- Footer -->
        <app-footer-secretary></app-footer-secretary>
    </div>
</div>
<!-- Right Side Bar -->
<app-rightsidebar-secretary (settingsButtonClicked)="onSettingsButtonClicked()"></app-rightsidebar-secretary>
