<div id="layout-wrapper" (window:resize)="onResize($event)">
    <!-- Top Bar 
    <app-topbar (mobileMenuButtonClicked)="onToggleMobileMenu()"></app-topbar>-->
    <!-- Side Bar -->
    @if(issemiboxLayoutRequested()){
    <app-sidebar-patient></app-sidebar-patient>
    }
    @if(isTwoColumnLayoutRequested()){
    <app-two-column-sidebar-patient></app-two-column-sidebar-patient>
    }
    <app-sidebar-patient id="side-bar" class="d-none"></app-sidebar-patient>
    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid">
                <!-- Main Content -->
                <router-outlet></router-outlet>
            </div>
        </div>
        <!-- Footer -->
        <app-footer-patient></app-footer-patient>
    </div>
</div>
<!-- Right Side Bar -->
<app-rightsidebar-patient (settingsButtonClicked)="onSettingsButtonClicked()"></app-rightsidebar-patient>
